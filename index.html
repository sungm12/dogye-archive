        // 브라우저 대용량 저장소 IndexedDB (실제 파일 첨부 및 다운로드용)
        const DB_NAME = "DogyeArchiveDB";
        const STORE_NAME = "materials_files";

        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function saveFileToIndexedDB(id, file) {
            return initIndexedDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(file, id);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                });
            });
        }

        function getFileFromIndexedDB(id) {
            return initIndexedDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(id);
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            });
        }

                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', newId), formatDoc);

                        console.log("Cloud sync error. Data stored safely inside local cache.");
                    }
                }

                showToast("실제 학습 기증 파일과 분석 자료가 데이터베이스에 등재 완료되었습니다!");
                setIsUploadOpen(false);
                setNewTitle("");
                setNewFile(null);
                setNewDescription("");
            };

            const handleLike = async (mId) => {
                if (!user) return;
                const updatedList = materials.map(m => {
                    if (m.id === mId) {
                        return { ...m, likes: (m.likes || 0) + 1 };
                    }
                    return m;
                });

                setMaterials(updatedList);
                localStorage.setItem("dogye_archive_materials", JSON.stringify(updatedList));

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;
                    const target = materials.find(m => m.id === mId);

                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', mId), {
                            likes: (target.likes || 0) + 1
                        });
                    } catch (err) {
                        console.log("Cloud likes synchronization delayed.");
                    }
                }
                showToast("소중한 학습 기부 자료에 유용한 보탬(좋아요)을 실었습니다.");
            };

            // 진짜 기부 파일 다운로드 구조 (IndexedDB 복구 연동)
            const handleDownloadSimulate = async (mId) => {
                if (!user) return;
                const updatedList = materials.map(m => {
                    if (m.id === mId) {
                        return { ...m, downloads: (m.downloads || 0) + 1 };
                    }
                    return m;
                });

                setMaterials(updatedList);
                localStorage.setItem("dogye_archive_materials", JSON.stringify(updatedList));

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;
                    const target = materials.find(m => m.id === mId);

                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', mId), {
                            downloads: (target.downloads || 0) + 1
                        });
                    } catch (err) {
                        console.log("Cloud downloads statistics synchronization delayed.");
                    }
                }

                // IndexedDB에서 바이너리 진짜 파일 끄집어내기 시도
                try {
                    const actualFileObj = await getFileFromIndexedDB(mId);
                    if (actualFileObj) {
                        const blobUrl = URL.createObjectURL(actualFileObj);
                        const link = document.createElement("a");
                        link.href = blobUrl;
                        link.download = actualFileObj.name;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(blobUrl);
                        showToast("실제 원본 기증 파일을 브라우저로 완벽하게 다운로드했습니다!");
                        return;
                    }
                } catch (e) {
                    console.warn("Real file storage index lookup failed. Converting to virtual placeholder text.", e);
                }

                // 가상 예시용 텍스트 가이드 복원 다운로드 포맷
                const docTemplate = `도계고등학교 학습 아카이브 기증 문서 안내\n` + 
                                    `========================================\n` +
                                    `자료 제목: ${selectedMaterial.title}\n` +
                                    `작성 학우: ${selectedMaterial.uploader} (${selectedMaterial.uploaderEmail})\n` +
                                    `과목 분류: ${selectedMaterial.subject} (${selectedMaterial.type})\n` +
                                    `작성 일자: ${selectedMaterial.date}\n\n` +
                                    `[소개 및 핵심 팁]\n` +
                                    `${selectedMaterial.description}\n\n` +
                                    `* 본 파일은 초기 기본 세팅 샘플이거나 IndexedDB 유실로 인해 생성된 텍스트 대체 안내서입니다.\n` +
                                    `* 학생들이 업로드한 신규 실제 학습 자료는 업로드하신 실제 확장자 및 온전한 파일 규격 그대로 완벽하게 다운로드됩니다.`;

                const blob = new Blob([docTemplate], { type: "text/plain;charset=utf-8" });
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = blobUrl;
                link.download = `[기부안내서]_${selectedMaterial.fileName}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);

                showToast("초기 예시 기부 안내 텍스트 다운로드를 진행했습니다.");
            };

            const handleCommentSubmit = async (e) => {
                e.preventDefault();
                if (!user || !selectedMaterial || !commentInput.trim()) return;

                const newComment = {
                    id: String(Date.now()),
                    author: user.name,
                    authorEmail: user.email,
                    text: commentInput.trim(),
                    date: new Date().toISOString().split('T')[0]

                const updatedComments = [...(selectedMaterial.comments || []), newComment];
                const updatedList = materials.map(m => {
                    if (m.id === selectedMaterial.id) {
                        return { ...m, comments: updatedComments };
                    }
                    return m;
                });

                setMaterials(updatedList);
                localStorage.setItem("dogye_archive_materials", JSON.stringify(updatedList));

                const updatedTarget = updatedList.find(m => m.id === selectedMaterial.id);
                if (updatedTarget) {
                    setSelectedMaterial(updatedTarget);

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;

                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', selectedMaterial.id), {
                            comments: updatedComments

                    } catch (err) {

                        const filtered = materials.filter(m => m.id !== mId);
                        setMaterials(filtered);
                        localStorage.setItem("dogye_archive_materials", JSON.stringify(filtered));
                        setSelectedMaterial(null);

                        if (!isLocalMode && window.firebaseMethods) {
                            const { doc, deleteDoc } = window.firebaseMethods;
                            const db = window.db;
                            const appId = window.appId;

                            try {
                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', mId));

                                console.log("Cloud deletion synchronize interrupted.");
                            }

                        const filteredComments = (selectedMaterial.comments || []).filter(c => c.id !== commentId);
                        const updatedList = materials.map(m => {
                            if (m.id === selectedMaterial.id) {
                                return { ...m, comments: filteredComments };

                            return m;

                        setMaterials(updatedList);

                        const updatedTarget = updatedList.find(m => m.id === selectedMaterial.id);
                        if (updatedTarget) {
                            setSelectedMaterial(updatedTarget);
                        }

                        if (!isLocalMode && window.firebaseMethods) {

                            try {
                                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', selectedMaterial.id), {

                                console.log("Cloud comment deletion synchronize failed.");

                    },
                    "주의: 피드백 강제 규제"
                );
            };

                                            <input

                                    <h2 className="text-base font-bold text-purple-800 flex items-center gap-1.5">
                                        <i className="fa-solid fa-user-shield"></i>
                                        👑 Dogye Archive 전교 실시간 관리 콘솔
                                    </h2>
                                    <button 
                                        onClick={() => setIsAdminConsoleOpen(false)}
                                        className="text-purple-400 hover:text-purple-600">
                                        <i className="fa-solid fa-xmark text-lg"></i>
                                    </button>
                                </div>

                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    {/* 긴급 배너 송출기 */}
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3">
                                        <h3 className="text-xs font-extrabold text-slate-700 flex items-center gap-1.5">
                                            <i className="fa-solid fa-bullhorn text-blue-600"></i>
                                            글로벌 헤드라인 공지사항 편집 배포
                                        </h3>
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                placeholder="도계고 전교생에 실시간으로 전파할 내용을 적어 보세요."
                                                value={noticeEditor}
                                                onChange={(e) => setNoticeEditor(e.target.value)}
                                                className="flex-1 px-3 py-2 bg-white border border-slate-300 rounded-xl focus:ring-1 focus:ring-blue-500 focus:outline-none text-xs"
                                            />
                                            <button 
                                                onClick={updateGlobalNotice}
                                                className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-xl text-xs shrink-0 transition-all">
                                                즉각 송출
                                            </button>
                                        </div>
                                    </div>

                                    {/* 정회원 명부 */}
                                    <div className="space-y-3">
                                        <h3 className="text-xs font-extrabold text-slate-700 flex items-center gap-1.5">
                                            <i className="fa-solid fa-address-book text-purple-600"></i>
                                            도계 아카이브 인가 완료 학생 인명부 ({usersList.length}명)
                                        </h3>
                                        <div className="border border-slate-200 rounded-2xl overflow-hidden max-h-[250px] overflow-y-auto">
                                            <table className="w-full text-left border-collapse text-xs">
                                                <thead>
                                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold">
                                                        <th className="p-3">학우 성함</th>
                                                        <th className="p-3">인가 학년</th>
                                                        <th className="p-3">등록 고유 이메일</th>
                                                        <th className="p-3">계정 등급</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-slate-600">
                                                    {usersList.map((usr, index) => (
                                                        <tr key={index} className="hover:bg-slate-50/50">
                                                            <td className="p-3 font-semibold text-slate-800">{usr.name}</td>
                                                            <td className="p-3">{usr.grade}</td>
                                                            <td className="p-3 font-mono text-slate-500">{usr.email}</td>
                                                            <td className="p-3">
                                                                {usr.role === "admin" ? (
                                                                    <span className="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-bold text-[9px]">ADMIN</span>
                                                                ) : (
                                                                    <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full text-[9px]">STUDENT</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {usersList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="4" className="p-4 text-center text-slate-400">가입 승인된 정회원 정보가 비어 있습니다.</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 커스텀 Alert 경고 패널 */}
                    {customAlert && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200 text-center space-y-4">
                                <div className="text-blue-600 text-3xl animate-bounce">
                                    <i className="fa-solid fa-circle-exclamation"></i>
                                </div>
                                <div className="space-y-1">
                                    <h3 className="text-sm font-bold text-slate-800">{customAlert.title}</h3>
                                    <p className="text-xs text-slate-500 leading-relaxed">{customAlert.message}</p>
                                </div>
                                <button 
                                    onClick={() => setCustomAlert(null)}
                                    className="w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold py-2 rounded-xl transition-all">
                                    동의 및 확인
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 커스텀 Confirm 확인 통제 패널 */}
                    {customConfirm && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200 text-center space-y-4">
                                <div className="text-amber-500 text-3xl">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <div className="space-y-1">
                                    <h3 className="text-sm font-bold text-slate-800">{customConfirm.title}</h3>
                                    <p className="text-xs text-slate-500 leading-relaxed">{customConfirm.message}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setCustomConfirm(null)}
                                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-2 rounded-xl transition-all">
                                        취소
                                    </button>
                                    <button 
                                        onClick={() => {
                                            customConfirm.onConfirm();
                                            setCustomConfirm(null);
                                        }}
                                        className="flex-1 bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-2 rounded-xl transition-all">
                                        권한 즉각 실행
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 피드백 실시간 알림 Toast */}
                    {toast && (
                        <div className="fixed bottom-4 right-4 z-[99] bg-slate-900 text-white py-3 px-5 rounded-xl shadow-2xl border border-slate-800 flex items-center space-x-2.5 max-w-sm">
                            {toast.type === "error" ? (
                                <span className="text-red-400 text-sm shrink-0"><i className="fa-solid fa-circle-xmark"></i></span>
                            ) : (
                                <span className="text-green-400 text-sm shrink-0"><i className="fa-solid fa-circle-check"></i></span>
                            )}
                            <span className="text-xs font-medium">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
