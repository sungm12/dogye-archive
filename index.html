    <script type="text/babel">
        // 브라우저 대용량 저장소 IndexedDB (오프라인 모드용 예비 저장소)
        const DB_NAME = "DogyeArchiveDB";
        const STORE_NAME = "materials_files";

        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function saveFileToIndexedDB(id, file) {
            return initIndexedDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(file, id);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                });
            });
        }

        function getFileFromIndexedDB(id) {
            return initIndexedDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(id);
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            });
        }

                const today = new Date();
                // 날짜만 비교하기 위해 시간 초기화
                today.setHours(0, 0, 0, 0); 
                const targetDate = new Date(targetDateStr);
                targetDate.setHours(0, 0, 0, 0);
                const diffTime = targetDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays;
            };

                if (window.MathJax && window.MathJax.typesetPromise) {

                }
            }, [materials, selectedMaterial, activeMainTab]);

            // Firestore 실시간 리스너 (자료실)
            const listenToCloudMaterials = () => {
                const { collection, onSnapshot } = window.firebaseMethods;

            // 🚀 핵심 1: 파일 업로드 (Firebase Storage + IndexedDB 백업)
            const handleUpload = async (e) => {
                e.preventDefault();
                if (!user) return;
                if (!newTitle || !newFile || !newDescription) {
                    triggerAlert("제목, 자료 소개, 그리고 실제 파일을 모두 첨부해 주세요.");
                    return;
                }

                const newId = String(Date.now());
                let downloadUrl = null;
                setUploadProgress(10); // 로딩 시작

                // 1. Firebase Storage 클라우드 업로드 시도
                if (!isLocalMode && window.firebaseMethods && window.firebaseMethods.ref) {
                    try {
                        const { ref, uploadBytesResumable, getDownloadURL } = window.firebaseMethods;
                        const storage = window.storage;
                        // 한글 파일명 인코딩 문제 방지를 위해 영문/숫자 조합 아이디 덧붙임
                        const safeFileName = `${newId}_${newFile.name}`;
                        const fileRef = ref(storage, `materials/${safeFileName}`);
                        
                        const uploadTask = uploadBytesResumable(fileRef, newFile);
                        
                        await new Promise((resolve, reject) => {
                            uploadTask.on('state_changed', 
                                (snapshot) => {
                                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                    setUploadProgress(Math.max(10, Math.round(progress)));
                                }, 
                                (error) => reject(error), 
                                async () => {
                                    downloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
                                    resolve();
                                }
                            );
                        });
                        setUploadProgress(100);
                    } catch (err) {

                    comments: [],

                };

            const handleDownload = async (mat) => {
                if (!user) return;
                
                // 다운로드 수 증가
                const updatedList = materials.map(m => m.id === mat.id ? { ...m, downloads: (m.downloads || 0) + 1 } : m);
                setMaterials(updatedList);
                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'materials', mat.id), { downloads: (mat.downloads || 0) + 1 }).catch(()=>{});

                // 1. Storage 클라우드 다운로드
                if (mat.fileUrl) {
                    // a 태그를 생성하여 진짜 파일을 다운로드하도록 강제
                    fetch(mat.fileUrl)
                        .then(response => response.blob())
                        .then(blob => {
                            const blobUrl = window.URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.href = blobUrl;
                            link.download = mat.fileName;
                            document.body.appendChild(link);
                            link.click();
                            link.remove();
                            window.URL.revokeObjectURL(blobUrl);
                            showToast("클라우드에서 원본 파일을 완벽하게 다운로드했습니다!");

                            window.open(mat.fileUrl, '_blank');

                        });
                    return;

                    const actualFileObj = await getFileFromIndexedDB(mat.id);

                        const blobUrl = URL.createObjectURL(actualFileObj);
                        const link = document.createElement("a");
                        link.href = blobUrl;
                        link.download = actualFileObj.name;
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                        URL.revokeObjectURL(blobUrl);
                        showToast("로컬 저장소에서 원본 파일을 다운로드했습니다!");
                        return;
                    }

                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                <ul className="divide-y divide-slate-100">
                                    {filteredQna.map(qna => (
                                        <li key={qna.id} className="p-5 hover:bg-slate-50 transition-all cursor-pointer flex flex-col sm:flex-row sm:items-center justify-between gap-4" onClick={() => setSelectedQna(qna)}>
                                            <div className="flex-1">
                                                <div className="flex gap-1.5 mb-1.5">
                                                    <span className="bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-0.5 rounded">{qna.subject}</span>
                                                    {qna.answers > 0 && <span className="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded">답변완료</span>}
                                                </div>
                                                <h3 className="text-sm font-bold text-slate-800">{qna.title}</h3>
                                                <p className="text-xs text-slate-500 mt-1 line-clamp-1">{qna.content}</p>
                                            </div>
                                            <div className="text-xs text-slate-400 shrink-0 text-left sm:text-right flex sm:flex-col gap-2 sm:gap-1">
                                                <span>{qna.author}</span>
                                                <span><i className="fa-regular fa-comment mr-1"></i>답변 {qna.answers || 0}</span>
                                                <span className="text-[10px]">{qna.date}</span>
                                            </div>
                                        </li>
                                    ))}
                                    {filteredQna.length === 0 && <div className="py-16 text-center text-slate-400">등록된 질문이 없습니다. 궁금한 점을 남겨보세요!</div>}
                                </ul>
                            </div>
                        )}
                    </main>

                    {/* 자료실 상세 모달 (미리보기 포함) */}
                    {selectedMaterial && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden border border-slate-200 flex flex-col">
                                <div className="p-5 border-b border-slate-100 flex items-start justify-between bg-slate-50">
                                    <h2 className="text-lg font-extrabold text-slate-800 pr-4">{selectedMaterial.title}</h2>
                                    <button onClick={() => setSelectedMaterial(null)} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>

                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    {/* 🚀 기능 4: 미리보기 모드 렌더링 */}
                                    {isPreviewMode && selectedMaterial.fileUrl ? (
                                        <div className="bg-slate-900 rounded-xl overflow-hidden shadow-inner h-[60vh] relative">
                                            <div className="absolute top-2 right-2 bg-black/50 text-white text-xs px-2 py-1 rounded">미리보기 모드</div>
                                            {isPdfOrImage(selectedMaterial.fileName) ? (
                                                <iframe src={selectedMaterial.fileUrl} className="w-full h-full border-0 bg-white" title="Preview"></iframe>
                                            ) : (
                                                <div className="w-full h-full flex flex-col items-center justify-center text-slate-400">
                                                    <i className="fa-solid fa-file-circle-exclamation text-4xl mb-3"></i>
                                                    <p>미리보기를 지원하지 않는 파일 형식입니다. (PDF 및 이미지만 가능)</p>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <>
                                            <div>
                                                <h4 className="text-xs font-bold text-slate-400 uppercase mb-2">분석 및 설명</h4>
                                                <p className="text-sm text-slate-700 bg-slate-50 p-4 rounded-xl border border-slate-100 whitespace-pre-wrap">{selectedMaterial.description}</p>
                                            </div>
                                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                                                <div className="flex items-center space-x-3 w-full sm:w-auto overflow-hidden">
                                                    <div className="bg-blue-600 text-white p-3 rounded-xl shrink-0"><i className="fa-solid fa-file-invoice text-xl"></i></div>
                                                    <div className="truncate">
                                                        <p className="text-sm font-bold text-slate-700 truncate">{selectedMaterial.fileName}</p>
                                                        {selectedMaterial.fileSize && <p className="text-[10px] text-slate-500">{(selectedMaterial.fileSize/(1024*1024)).toFixed(2)} MB</p>}
                                                    </div>
                                                </div>
                                                <div className="flex gap-2 w-full sm:w-auto">
                                                    {/* 미리보기 버튼 (Storage URL이 있고 지원 확장자일 때만) */}
                                                    {selectedMaterial.fileUrl && isPdfOrImage(selectedMaterial.fileName) && (
                                                        <button onClick={() => setIsPreviewMode(true)} className="flex-1 sm:flex-none bg-white text-blue-600 border border-blue-200 font-bold px-4 py-2.5 rounded-xl transition-all shadow-sm text-xs text-center">
                                                            <i className="fa-solid fa-eye mr-1"></i>미리보기
                                                        </button>
                                                    )}
                                                    <button onClick={() => handleDownload(selectedMaterial)} className="flex-1 sm:flex-none bg-blue-600 text-white font-bold px-5 py-2.5 rounded-xl shadow-md text-xs whitespace-nowrap">
                                                        <i className="fa-solid fa-download mr-1"></i>다운로드
                                                    </button>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {isPreviewMode && (
                                        <button onClick={() => setIsPreviewMode(false)} className="w-full text-center text-sm font-bold text-slate-500 hover:text-slate-800 mb-4">
                                            <i className="fa-solid fa-arrow-left mr-1"></i>상세정보로 돌아가기
                                        </button>
                                    )}

                                    {!isPreviewMode && (
                                        <div className="space-y-4">
                                            <div className="flex justify-between text-xs text-slate-400 border-b border-slate-100 pb-2">
                                                <span>작성자: {selectedMaterial.uploader}</span>
                                                {user?.role === "admin" && <button onClick={() => deleteMaterial(selectedMaterial.id)} className="text-red-500 font-bold"><i className="fa-solid fa-trash mr-1"></i>삭제</button>}
                                            </div>
                                            <h4 className="text-xs font-bold text-slate-500">댓글 피드백</h4>
                                            <div className="space-y-3 max-h-40 overflow-y-auto">
                                                {(selectedMaterial.comments || []).map(c => (
                                                    <div key={c.id} className="bg-slate-50 p-3 rounded-lg text-xs"><span className="font-bold mr-2">{c.author}</span><span className="text-slate-600">{c.text}</span></div>
                                                ))}
                                            </div>
                                            <form onSubmit={(e) => handleCommentSubmit(e, selectedMaterial.id, false)} className="flex gap-2">
                                                <input type="text" placeholder="댓글 달기..." value={commentInput} onChange={(e)=>setCommentInput(e.target.value)} className="flex-1 px-3 py-2 bg-slate-50 border rounded-lg text-xs" />
                                                <button type="submit" className="bg-slate-800 text-white px-3 rounded-lg text-xs font-bold">등록</button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Q&A 상세 모달 */}
                    {selectedQna && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden border border-slate-200 flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex items-start justify-between bg-slate-50">
                                    <div>
                                        <span className="bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-0.5 rounded mb-2 inline-block">{selectedQna.subject}</span>
                                        <h2 className="text-lg font-extrabold text-slate-800 leading-snug">{selectedQna.title}</h2>
                                        <p className="text-xs text-slate-400 mt-1">작성자: {selectedQna.author} | {selectedQna.date}</p>
                                    </div>
                                    <button onClick={() => setSelectedQna(null)} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 text-sm text-slate-700 whitespace-pre-wrap leading-relaxed min-h-[100px]">
                                        {selectedQna.content}
                                    </div>
                                    
                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div className="flex justify-between items-center">
                                            <h4 className="text-xs font-bold text-slate-500">답변 및 댓글 ({selectedQna.answers || 0})</h4>
                                            {user?.role === "admin" && <button onClick={() => deleteQna(selectedQna.id)} className="text-red-500 text-xs font-bold"><i className="fa-solid fa-trash mr-1"></i>게시글 삭제</button>}
                                        </div>
                                        <div className="space-y-3 max-h-60 overflow-y-auto">
                                            {(selectedQna.comments || []).map(c => (
                                                <div key={c.id} className="bg-emerald-50 p-3 rounded-lg text-xs border border-emerald-100">
                                                    <div className="font-bold text-emerald-800 mb-1">{c.author} <span className="text-slate-400 font-normal text-[10px] ml-2">{c.date}</span></div>
                                                    <div className="text-slate-700">{c.text}</div>
                                                </div>
                                            ))}
                                            {(selectedQna.comments || []).length === 0 && <p className="text-xs text-slate-400 text-center py-4">아직 답변이 없습니다. 아는 내용이라면 답변을 달아주세요!</p>}
                                        </div>
                                        <form onSubmit={(e) => handleCommentSubmit(e, selectedQna.id, true)} className="flex gap-2">
                                            <input type="text" placeholder="도움이 되는 답변을 남겨주세요." value={commentInput} onChange={(e)=>setCommentInput(e.target.value)} className="flex-1 px-3 py-2 bg-white border border-slate-300 rounded-xl focus:ring-1 focus:ring-blue-500 text-xs" />
                                            <button type="submit" className="bg-emerald-600 text-white px-4 rounded-xl text-xs font-bold shadow-sm">답변하기</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Q&A 작성 모달 */}
                    {isQnaWriteOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                                    <h2 className="text-base font-bold text-slate-800"><i className="fa-solid fa-pen text-purple-600 mr-2"></i>질문 / 자료 요청 작성</h2>
                                    <button onClick={() => setIsQnaWriteOpen(false)} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>
                                <form onSubmit={handleQnaSubmit} className="p-6 space-y-4">
                                    <div><input type="text" placeholder="제목을 적어주세요 (예: 2학기 문학 기출 구합니다!)" value={newQnaTitle} onChange={(e)=>setNewQnaTitle(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm focus:ring-1 focus:ring-blue-500" /></div>
                                    <div>
                                        <select value={newQnaSubject} onChange={(e)=>setNewQnaSubject(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none bg-white">
                                            <option value="국어">국어</option><option value="수학">수학</option><option value="영어">영어</option><option value="과학">과학</option><option value="기타">기타 요청</option>
                                        </select>
                                    </div>
                                    <div><textarea placeholder="궁금한 문제나 필요한 자료를 상세히 적어주세요." value={newQnaContent} onChange={(e)=>setNewQnaContent(e.target.value)} rows="5" className="w-full px-3 py-2 border rounded-xl text-sm resize-none focus:ring-1 focus:ring-blue-500"></textarea></div>
                                    <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow text-sm">게시글 등록하기</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 자료 기부 모달 (수정됨: 업로드 프로그레스 바 추가) */}
                    {isUploadOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-slate-100 flex justify-between bg-slate-50">
                                    <h2 className="text-base font-bold"><i className="fa-solid fa-file-arrow-up text-blue-600 mr-2"></i>자료 기부하기</h2>
                                    <button onClick={() => { setIsUploadOpen(false); setUploadProgress(0); }} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleUpload} className="p-6 space-y-4">
                                    <input type="text" placeholder="자료 제목" value={newTitle} onChange={(e)=>setNewTitle(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-xs" />
                                    <div className="flex gap-2">
                                        <select value={newGrade} onChange={(e)=>setNewGrade(e.target.value)} className="flex-1 px-3 py-2 border rounded-xl text-xs"><option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option></select>
                                        <select value={newSubject} onChange={(e)=>setNewSubject(e.target.value)} className="flex-1 px-3 py-2 border rounded-xl text-xs"><option value="국어">국어</option><option value="수학">수학</option><option value="물리학 I">물리학 I</option><option value="통합과학">통합과학</option></select>
                                    </div>
                                    <div className="border-2 border-dashed border-blue-200 bg-blue-50/50 rounded-2xl p-6 text-center cursor-pointer relative hover:border-blue-400">
                                        <input type="file" onChange={(e) => e.target.files && setNewFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                        {newFile ? (
                                            <div><p className="text-xs font-bold text-blue-700 truncate">{newFile.name}</p><p className="text-[10px] text-slate-400 mt-1">{(newFile.size/(1024*1024)).toFixed(2)} MB</p></div>
                                        ) : (
                                            <div><i className="fa-solid fa-file-circle-plus text-3xl text-blue-300 mb-2"></i><p className="text-xs font-bold text-slate-600">이곳을 눌러 실제 파일을 첨부하세요</p><p className="text-[10px] text-slate-400">PDF, 이미지, HWP 등 모두 지원</p></div>
                                        )}
                                    </div>
                                    <textarea placeholder="자료에 대한 팁이나 오답노트를 적어주세요." value={newDescription} onChange={(e)=>setNewDescription(e.target.value)} rows="3" className="w-full px-3 py-2 border rounded-xl text-xs resize-none"></textarea>
                                    
                                    {/* 🚀 파일 업로드 프로그레스 바 */}
                                    {uploadProgress > 0 && uploadProgress < 100 && (
                                        <div className="w-full bg-slate-200 rounded-full h-2.5 mb-4">
                                            <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                                            <p className="text-[10px] text-center text-slate-500 mt-1">서버에 안전하게 올리는 중... {uploadProgress}%</p>
                                        </div>
                                    )}
                                    
                                    <button type="submit" disabled={uploadProgress > 0 && uploadProgress < 100} className="w-full bg-blue-600 disabled:bg-blue-300 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md text-sm">도계 아카이브 등재 신청</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 토스트 및 알림창 등 유틸 모달 유지 */}
                    {toast && <div className="fixed bottom-4 right-4 z-[99] bg-slate-900 text-white py-3 px-5 rounded-xl text-xs">{toast.message}</div>}
                    {customAlert && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl max-w-sm w-full text-center"><h3 className="font-bold text-slate-800 mb-2">{customAlert.title}</h3><p className="text-xs text-slate-500 mb-4 whitespace-pre-wrap">{customAlert.message}</p><button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-xl">확인</button></div>
                        </div>
                    )}
                    {customConfirm && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl max-w-sm w-full text-center"><h3 className="font-bold text-slate-800 mb-2">{customConfirm.title}</h3><p className="text-xs text-slate-500 mb-4">{customConfirm.message}</p>
                                <div className="flex gap-2"><button onClick={()=>setCustomConfirm(null)} className="flex-1 bg-slate-100 text-xs font-bold py-2 rounded-xl">취소</button><button onClick={()=>{customConfirm.onConfirm(); setCustomConfirm(null);}} className="flex-1 bg-red-600 text-white text-xs font-bold py-2 rounded-xl">실행</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
