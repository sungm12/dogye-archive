<body class="min-h-screen text-slate-800">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 가짜 설정값 (배포 전까지는 오류 나지 않도록 로컬 Fallback이 자동 작동함)
        const firebaseConfig = {
            apiKey: "DUMMY_API_KEY_DOGYE_ARCHIVE_PLACEHOLDER",
            authDomain: "dogye-archive.firebaseapp.com",
            projectId: "dogye-archive",
            storageBucket: "dogye-archive.firebasestorage.app",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:dummyappid"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            window.db = db;
            window.auth = auth;
            window.appId = "dogye-archive-app";
            window.firebaseMethods = {
                signInAnonymously,
                onAuthStateChanged,
                doc,
                getDoc,
                setDoc,
                updateDoc,
                deleteDoc,
                collection,
                addDoc,
                onSnapshot
            };
            window.dispatchEvent(new Event('firebase-initialized'));
        } catch (err) {
            console.warn("Firebase initialization skipped or failed. Hybrid Local Mode is activated automatically.", err);
            window.firebaseMethods = null;
            window.dispatchEvent(new Event('firebase-initialized'));
        }
    </script>

    <script type="text/babel">
        // 브라우저 내부 대용량 스토리지 IndexedDB 초기화 및 제어 함수
        const DB_NAME = "DogyeArchiveDB";
        const STORE_NAME = "materials_files";

        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function saveFileToIndexedDB(id, file) {
            return initIndexedDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(file, id);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                });
            });
        }

        function getFileFromIndexedDB(id) {
            return initIndexedDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(id);
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            });
        }

        const { useState, useEffect, useRef } = React;

        // 도계고등학교 이메일 인증용 고정 도메인
        const SCHOOL_DOMAIN = "dogye.hs.kr";

        

        function App() {
            const [user, setUser] = useState(null); 
            const [isLoginView, setIsLoginView] = useState(true);
            const [isLocalMode, setIsLocalMode] = useState(true); // 기본적으로 로컬 모드로 시작하여 오프라인 지원
            const [isFirebaseLoading, setIsFirebaseLoading] = useState(true);
            
            // 회원가입 폼 상태값들
            const [signUpEmail, setSignUpEmail] = useState("");
            const [signUpPassword, setSignUpPassword] = useState("");
            const [signUpPasswordConfirm, setSignUpPasswordConfirm] = useState("");
            const [signUpName, setSignUpName] = useState("");
            const [signUpGrade, setSignUpGrade] = useState("1학년");
            
            // 로그인 폼 상태값들
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            // 메인 학습 자료 리스트 및 필터 상태값들
            const [materials, setMaterials] = useState([]);
            const [selectedMaterial, setSelectedMaterial] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeGradeFilter, setActiveGradeFilter] = useState("전체");
            const [activeSubjectFilter, setActiveSubjectFilter] = useState("전체");
            const [activeTypeFilter, setActiveTypeFilter] = useState("전체");
            
            // 실시간 공지사항 상태값
            const [noticeText, setNoticeText] = useState("도계고 아카이브에 오신 것을 환영합니다! 신뢰성 있는 학습 자료를 서로 적극적으로 기여해주세요.");
            const [noticeEditor, setNoticeEditor] = useState("");

            // 업로드 모달 관련 상태값들 (실제 파일 객체 상태 포함)
            const [isUploadOpen, setIsUploadOpen] = useState(false);
            const [newTitle, setNewTitle] = useState("");
            const [newSubject, setNewSubject] = useState("물리학 I");
            const [newGrade, setNewGrade] = useState("1학년");
            const [newType, setNewType] = useState("요약 노트");
            const [newFile, setNewFile] = useState(null); // 실제 파일 오브젝트
            const [newDescription, setNewDescription] = useState("");
            
            // 관리자 전용 대시보드 모달
            const [isAdminConsoleOpen, setIsAdminConsoleOpen] = useState(false);
            const [usersList, setUsersList] = useState([]);

            // 실시간 상호작용 피드백 (Toast, Custom Confirm, Custom Alert)
            const [commentInput, setCommentInput] = useState("");
            const [toast, setToast] = useState(null);
            const [customConfirm, setCustomConfirm] = useState(null);
            const [customAlert, setCustomAlert] = useState(null);

            const showToast = (message, type = "success") => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const triggerAlert = (message, title = "안내") => {
                setCustomAlert({ message, title });
            };

            const triggerConfirm = (message, onConfirm, title = "확인 요청") => {
                setCustomConfirm({ message, title, onConfirm });
            };

            const sanitizeEmailForDocId = (email) => {
                return email.replace(/\./g, "_");
            };

            const isAdministrator = (email) => {
                return email === "sungmin@dogye.hs.kr" || email === "admin@dogye.hs.kr";
            };

            const isValidSchoolEmail = (email) => {
                return email.endsWith(`@${SCHOOL_DOMAIN}`);
            };

            // 초기 로딩 및 세션 복구 구조
            useEffect(() => {
                const initializeDatabase = () => {
                    // LocalStorage 세션 복구 및 기본 데이터 설정
                    const savedUser = localStorage.getItem("dogye_current_user");
                    if (savedUser) {
                        try {
                            setUser(JSON.parse(savedUser));
                        } catch (e) {
                            localStorage.removeItem("dogye_current_user");
                        }
                    }

                    // 로컬 학습자료 데이터베이스 초기화
                    const savedMaterials = localStorage.getItem("dogye_archive_materials");
                    if (!savedMaterials) {
                        localStorage.setItem("dogye_archive_materials", JSON.stringify(INITIAL_MATERIALS));
                        setMaterials(INITIAL_MATERIALS);
                    } else {
                        try {
                            setMaterials(JSON.parse(savedMaterials));
                        } catch (e) {
                            setMaterials(INITIAL_MATERIALS);
                        }
                    }

                    // 로컬 공지사항 세팅
                    const savedNotice = localStorage.getItem("dogye_archive_notice");
                    if (savedNotice) {
                        setNoticeText(savedNotice);
                        setNoticeEditor(savedNotice);
                    } else {
                        setNoticeEditor(noticeText);
                    }

                    // 기본 관리자 계정 정보 미리 주입 (로컬 테스트용)
                    const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                    const adminExists = localUsers.some(u => u.email === "admin@dogye.hs.kr");
                    if (!adminExists) {
                        localUsers.push({
                            name: "최고관리자",
                            email: "admin@dogye.hs.kr",
                            password: "dogyehs2027",
                            grade: "관리자",
                            role: "admin",
                            schoolUserId: "admin_master_system"
                        });
                        localStorage.setItem("dogye_archive_users", JSON.stringify(localUsers));
                    }
                };

                initializeDatabase();

                const setupFirebase = () => {
                    if (window.firebaseMethods) {
                        const { onAuthStateChanged, signInAnonymously } = window.firebaseMethods;
                        const auth = window.auth;

                        signInAnonymously(auth).then(() => {
                            onAuthStateChanged(auth, (fUser) => {
                                if (fUser) {
                                    setIsLocalMode(false); // Firebase 통신이 성공적으로 가능함을 확인
                                    listenToCloudMaterials();
                                    listenToCloudNotice();
                                }
                                setIsFirebaseLoading(false);
                            });
                        }).catch((err) => {
                            console.log("Using Hybrid Local Mode due to network state or sandbox restrictions.");
                            setIsLocalMode(true);
                            setIsFirebaseLoading(false);
                        });
                    } else {
                        setIsLocalMode(true);
                        setIsFirebaseLoading(false);
                    }
                };

                // Firebase 연결 시도 대기 및 체크
                if (document.readyState === 'complete') {
                    setupFirebase();
                } else {
                    window.addEventListener('load', setupFirebase);
                    return () => window.removeEventListener('load', setupFirebase);
                }
            }, []);

            // MathJax 수식 변환 감지 리스너
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log(err));
                }
            }, [materials, selectedMaterial]);

            // 실시간 클라우드 학습자료 리스너
            const listenToCloudMaterials = () => {
                const { collection, onSnapshot, doc, setDoc } = window.firebaseMethods;
                const db = window.db;
                const appId = window.appId;

                const materialsRef = collection(db, 'artifacts', appId, 'public', 'data', 'materials');
                onSnapshot(materialsRef, (snapshot) => {
                    if (snapshot.empty) {
                        INITIAL_MATERIALS.forEach(async (item) => {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', item.id), item);
                        });
                    } else {
                        const cloudList = [];
                        snapshot.forEach((d) => {
                            cloudList.push({ ...d.data(), id: d.id });
                        });
                        cloudList.sort((a, b) => b.date.localeCompare(a.date));
                        setMaterials(cloudList);
                        localStorage.setItem("dogye_archive_materials", JSON.stringify(cloudList));
                    }
                }, (error) => {
                    console.log("Firebase listener offline, switching completely to local engine.");
                    setIsLocalMode(true);
                });
            };

            // 실시간 클라우드 공지사항 리스너
            const listenToCloudNotice = () => {
                const { doc, onSnapshot } = window.firebaseMethods;
                const db = window.db;
                const appId = window.appId;

                const noticeRef = doc(db, 'artifacts', appId, 'public', 'notice');
                onSnapshot(noticeRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        setNoticeText(data.content || "");
                        setNoticeEditor(data.content || "");
                        localStorage.setItem("dogye_archive_notice", data.content || "");
                    }
                });
            };

            // 도계고 학생 가입 인명 리스트 로드
            const loadRegisteredUsers = () => {
                const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                setUsersList(localUsers);
            };

            // 안전한 듀얼 모드 로그인 처리
            const handleLogin = (e) => {
                e.preventDefault();
                if (!loginEmail || !loginPassword) {
                    triggerAlert("이메일과 패스워드를 올바르게 입력해주세요.", "로그인 보류");
                    return;
                }

                // [최고 관리자 마스터 키 즉시 우회 처리]
                if (loginEmail === "admin@dogye.hs.kr" && loginPassword === "dogyehs2027") {
                    const adminSession = {
                        name: "최고관리자",
                        email: "admin@dogye.hs.kr",
                        grade: "관리자 소속",
                        role: "admin",
                        schoolUserId: "admin_master_system"
                    };
                    setUser(adminSession);
                    localStorage.setItem("dogye_current_user", JSON.stringify(adminSession));
                    showToast("최고 관리자 계정으로 아카이브를 잠금 해제했습니다.");
                    return;
                }

                // 암묵적 도계고 도메인 검증
                if (!isValidSchoolEmail(loginEmail)) {
                    triggerAlert("로그인할 수 없는 계정 형식입니다.", "보안 위반 차단");
                    return;
                }

                const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                const found = localUsers.find(u => u.email === loginEmail);

                if (found) {
                    if (found.password === loginPassword) {
                        setUser(found);
                        localStorage.setItem("dogye_current_user", JSON.stringify(found));
                        showToast(`어서오세요, ${found.name} 학우님!`);
                    } else {
                        triggerAlert("비밀번호가 올바르지 않습니다.", "인증 실패");
                    }
                } else {
                    triggerAlert("가입되지 않은 정보이거나 일치하는 학생 회원이 없습니다.", "가입 내역 없음");
                }
            };

            // 안전한 듀얼 모드 회원 등록
            const handleSignUp = (e) => {
                e.preventDefault();
                if (!signUpName || !signUpEmail || !signUpPassword || !signUpPasswordConfirm) {
                    triggerAlert("모든 입력 칸을 빠짐없이 채워주세요.", "가입 입력 오류");
                    return;
                }

                if (signUpPassword !== signUpPasswordConfirm) {
                    triggerAlert("설정하신 비밀번호와 비밀번호 확인 칸이 일치하지 않습니다.", "가입 차단");
                    return;
                }

                // 암묵적 도계고 전용 도메인 검증 (가이드 문구를 숨겨도 완벽히 작동)
                if (!isValidSchoolEmail(signUpEmail)) {
                    triggerAlert("이 사이트는 인가된 학우 및 관계자만 이용할 수 있습니다.", "보안 통제");
                    return;
                }

                const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                if (localUsers.some(u => u.email === signUpEmail)) {
                    triggerAlert("이미 등록된 이메일 주소입니다. 로그인을 시도해 주세요.", "등록 중복");
                    return;
                }

                const resolvedRole = isAdministrator(signUpEmail) ? "admin" : "student";
                const newUser = {
                    name: signUpName,
                    email: signUpEmail,
                    password: signUpPassword,
                    grade: signUpGrade,
                    role: resolvedRole,
                    schoolUserId: "student_" + Date.now()
                };

                // 로컬 DB에 추가
                localUsers.push(newUser);
                localStorage.setItem("dogye_archive_users", JSON.stringify(localUsers));

                // 온라인 상태일 경우 Firestore 동시 업로드 시도
                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, setDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;
                    const emailSafe = sanitizeEmailForDocId(signUpEmail);

                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', emailSafe), newUser).catch((err) => {
                        console.log("Cloud backup failure, but local database saved safely.");
                    });
                }

                setUser(newUser);
                localStorage.setItem("dogye_current_user", JSON.stringify(newUser));
                showToast("도계고 아카이브 회원 가입이 정합성 심사를 거쳐 완료되었습니다!");
            };

            // 로그아웃 처리
            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem("dogye_current_user");
                showToast("성공적으로 도계 아카이브 세션을 종료했습니다.");
            };

            // 신규 학습자료 업로드 처리 (실제 파일 저장 추가)
            const handleUpload = async (e) => {
                e.preventDefault();
                if (!user) return;

                if (!newTitle || !newFile || !newDescription) {
                    triggerAlert("자료 제목, 실제 학습 파일, 상세 공부 팁을 모두 적어주셔야 등재가 완료됩니다.", "자료 기재 미비");
                    return;
                }

                const newId = String(Date.now());
                const formatDoc = {
                    id: newId,
                    title: newTitle,
                    grade: newGrade,
                    subject: newSubject,
                    type: newType,
                    uploader: user.name,
                    uploaderEmail: user.email,
                    fileType: newFile.name.split('.').pop() || 'pdf',
                    fileName: newFile.name,
                    fileSize: newFile.size, // 파일 용량 크기 바이트 단위 기록
                    downloads: 0,
                    likes: 0,
                    isVerified: user.role === "admin" ? true : false,
                    description: newDescription,
                    comments: [],
                    date: new Date().toISOString().split('T')[0]
                };

                // IndexedDB에 실제 바이너리 파일 영구 보관
                try {
                    await saveFileToIndexedDB(newId, newFile);
                } catch (err) {
                    console.error("IndexedDB 파일 저장 실패:", err);
                    triggerAlert("로컬 브라우저에 실제 파일을 저장하는 중 오류가 발생했습니다.", "파일 저장 실패");
                    return;
                }

                // 로컬 동기화 업데이트
                const updatedList = [formatDoc, ...materials];
                setMaterials(updatedList);
                localStorage.setItem("dogye_archive_materials", JSON.stringify(updatedList));

                // 클라우드 백업 시도 (클라우드 용량 부담 완화를 위해 메타데이터만 Firebase에 올립니다.)
                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, setDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;

                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', newId), formatDoc);
                    } catch (err) {
                        console.log("Cloud write error, running on secure local-mode.");
                    }
                }

                showToast("새 실제 학습 파일과 자료 기증 팁이 도계 아카이브에 안전하게 영구 저장되었습니다!");
                setIsUploadOpen(false);
                setNewTitle("");
                setNewFile(null);
                setNewDescription("");
            };

            // 좋아요(추천) 시스템
            const handleLike = async (mId) => {
                if (!user) return;
                const updatedList = materials.map(m => {
                    if (m.id === mId) {
                        return { ...m, likes: (m.likes || 0) + 1 };
                    }
                    return m;
                });

                setMaterials(updatedList);
                localStorage.setItem("dogye_archive_materials", JSON.stringify(updatedList));

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;
                    const target = materials.find(m => m.id === mId);

                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', mId), {
                            likes: (target.likes || 0) + 1
                        });
                    } catch (err) {
                        console.log("Cloud like counter update failed.");
                    }
                }

            // 실제 파일 다운로드 및 시뮬레이션 시스템
            const handleDownloadSimulate = async (mId) => {
                if (!user) return;
                const updatedList = materials.map(m => {
                    if (m.id === mId) {
                        return { ...m, downloads: (m.downloads || 0) + 1 };
                    }
                    return m;
                });

                setMaterials(updatedList);
                localStorage.setItem("dogye_archive_materials", JSON.stringify(updatedList));

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    const db = window.db;
                    const appId = window.appId;
                    const target = materials.find(m => m.id === mId);

                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'materials', mId), {
                            downloads: (target.downloads || 0) + 1
                        });
                    } catch (err) {
                        console.log("Cloud download counter update failed.");
                    }
                }

                // IndexedDB에서 원본 바이너리 파일 복원 시도
                try {
                    const actualFileObj = await getFileFromIndexedDB(mId);
                    if (actualFileObj) {
                        // 실제 원본 파일 다운로드 실행
                        const blobUrl = URL.createObjectURL(actualFileObj);
                        const link = document.createElement("a");
                        link.href = blobUrl;
                        link.download = actualFileObj.name;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(blobUrl);
                        showToast("업로드된 실제 학습 원본 파일을 다운로드했습니다!");
                        return;
                    }
                } catch (e) {
                    console.warn("IndexedDB에서 실제 파일을 찾지 못했거나 에러가 발생하여 데모용 가상 파일 다운로드로 전환합니다.", e);
                }

                // 초기 기본 샘플 자료(1, 2, 3번)를 위한 텍스트 다운로드 가이드라인 포맷 제공
                const docTemplate = `도계고등학교 학습 아카이브 기증 문서 안내\n` + 
                                    `========================================\n` +
                                    `자료 제목: ${selectedMaterial.title}\n` +
                                    `작성 학우: ${selectedMaterial.uploader} (${selectedMaterial.uploaderEmail})\n` +
                                    `과목 분류: ${selectedMaterial.subject} (${selectedMaterial.type})\n` +
                                    `작성 일자: ${selectedMaterial.date}\n\n` +
                                    `[소개 및 핵심 팁]\n` +
                                    `${selectedMaterial.description}\n\n` +
                                    `* 본 파일은 초기 기본 세팅 샘플이거나 IndexedDB 유실로 인해 생성된 텍스트 대체 안내서입니다.\n` +
                                    `* 학생들이 업로드한 신규 실제 학습 자료는 업로드하신 실제 확장자 및 온전한 파일 규격 그대로 완벽하게 다운로드됩니다.`;

                const blob = new Blob([docTemplate], { type: "text/plain;charset=utf-8" });
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = blobUrl;
                link.download = `[안내서]_${selectedMaterial.fileName}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);

                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    {/* 글로벌 배너 컨트롤러 */}
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3">
                                        <h3 className="text-xs font-extrabold text-slate-700 flex items-center gap-1.5">
                                            <i className="fa-solid fa-bullhorn text-blue-600"></i>
                                            실시간 중요 공지사항 편집 배포
                                        </h3>
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                placeholder="도계고 전원에게 실시간 전송할 공지를 입력해 보세요."
                                                value={noticeEditor}
                                                onChange={(e) => setNoticeEditor(e.target.value)}
                                                className="flex-1 px-3 py-2 bg-white border border-slate-300 rounded-xl focus:ring-1 focus:ring-blue-500 focus:outline-none text-xs"
                                            />
                                            <button 
                                                onClick={updateGlobalNotice}
                                                className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-xl text-xs shrink-0 transition-all">
                                                즉각 송출
                                            </button>
                                        </div>
                                    </div>

                                    {/* 학생 명부 이력 */}
                                    <div className="space-y-3">
                                        <h3 className="text-xs font-extrabold text-slate-700 flex items-center gap-1.5">
                                            <i className="fa-solid fa-address-book text-purple-600"></i>
                                            도계 아카이브 승인 가입 인명 리스트 ({usersList.length}명)
                                        </h3>
                                        <div className="border border-slate-200 rounded-2xl overflow-hidden max-h-[250px] overflow-y-auto">
                                            <table className="w-full text-left border-collapse text-xs">
                                                <thead>
                                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold">
                                                        <th className="p-3">학우 이름</th>
                                                        <th className="p-3">승인 학년</th>
                                                        <th className="p-3">고유 이메일</th>
                                                        <th className="p-3">시스템 권한</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-slate-600">
                                                    {usersList.map((usr, index) => (
                                                        <tr key={index} className="hover:bg-slate-50/50">
                                                            <td className="p-3 font-semibold text-slate-800">{usr.name}</td>
                                                            <td className="p-3">{usr.grade}</td>
                                                            <td className="p-3 font-mono text-slate-500">{usr.email}</td>
                                                            <td className="p-3">
                                                                {usr.role === "admin" ? (
                                                                    <span className="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-bold text-[9px]">ADMIN</span>
                                                                ) : (
                                                                    <span className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full text-[9px]">STUDENT</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {usersList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="4" className="p-4 text-center text-slate-400">가입 승인된 정회원이 현재 존재하지 않습니다.</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 커스텀 경고 및 알림 안내 모달 (alert 우회) */}
                    {customAlert && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200 text-center space-y-4">
                                <div className="text-blue-600 text-3xl animate-bounce">
                                    <i className="fa-solid fa-circle-exclamation"></i>
                                </div>
                                <div className="space-y-1">
                                    <h3 className="text-sm font-bold text-slate-800">{customAlert.title}</h3>
                                    <p className="text-xs text-slate-500 leading-relaxed">{customAlert.message}</p>
                                </div>
                                <button 
                                    onClick={() => setCustomAlert(null)}
                                    className="w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold py-2 rounded-xl transition-all">
                                    동의 및 확인
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 커스텀 확인 요청 모달 (confirm 우회) */}
                    {customConfirm && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200 text-center space-y-4">
                                <div className="text-amber-500 text-3xl">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <div className="space-y-1">
                                    <h3 className="text-sm font-bold text-slate-800">{customConfirm.title}</h3>
                                    <p className="text-xs text-slate-500 leading-relaxed">{customConfirm.message}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setCustomConfirm(null)}
                                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-2 rounded-xl transition-all">
                                        취소
                                    </button>
                                    <button 
                                        onClick={() => {
                                            customConfirm.onConfirm();
                                            setCustomConfirm(null);
                                        }}
                                        className="flex-1 bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-2 rounded-xl transition-all">
                                        의무 실행
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 실시간 알림 안내 Toast */}
                    {toast && (
                        <div className="fixed bottom-4 right-4 z-[99] bg-slate-900 text-white py-3 px-5 rounded-xl shadow-2xl border border-slate-800 flex items-center space-x-2.5 max-w-sm">
                            {toast.type === "error" ? (
                                <span className="text-red-400 text-sm shrink-0"><i className="fa-solid fa-circle-xmark"></i></span>
                            ) : (
                                <span className="text-green-400 text-sm shrink-0"><i className="fa-solid fa-circle-check"></i></span>
                            )}
                            <span className="text-xs font-medium">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
