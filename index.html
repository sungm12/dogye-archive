<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogye Archive - 도계고등학교 학습 자료실</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 및 ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN (JSX 컴파일) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- MathJax (수학 공식 렌더링용) -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Google Fonts - Noto Sans KR & Inter 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // 🚀 Firebase Storage 연동 (진짜 파일 업로드/다운로드용)
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // 전성민님의 진짜 Firebase API 설정값 연동완료
        const firebaseConfig = {
            apiKey: "AIzaSyBBDLP4uI9Mom_UMxKvnYDq9f2V72Y1fB4",
            authDomain: "dogye-archive.firebaseapp.com",
            projectId: "dogye-archive",
            storageBucket: "dogye-archive.firebasestorage.app",
            messagingSenderId: "435225858562",
            appId: "1:435225858562:web:f32232e414dbfc7ba30d1b"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            const storage = getStorage(app); 

            window.db = db;
            window.auth = auth;
            window.storage = storage; 
            window.appId = "dogye-archive-app";
            window.firebaseMethods = {
                signInAnonymously,
                onAuthStateChanged,
                doc,
                getDoc,
                setDoc,
                updateDoc,
                deleteDoc,
                collection,
                addDoc,
                onSnapshot,
                ref,
                uploadBytesResumable,
                getDownloadURL,
                deleteObject
            };
            window.dispatchEvent(new Event('firebase-initialized'));
        } catch (err) {
            console.warn("Firebase initialization failed. Operating on Secure Offline mode.", err);
            window.firebaseInitError = err.message || String(err);
            window.firebaseMethods = null;
            window.dispatchEvent(new Event('firebase-initialized'));
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const SCHOOL_DOMAIN = "dogye.hs.kr";

        function App() {
            const [user, setUser] = useState(null); 
            const [isLoginView, setIsLoginView] = useState(true);
            const [isLocalMode, setIsLocalMode] = useState(true); 
            const [isFirebaseLoading, setIsFirebaseLoading] = useState(true);
            const [firebaseError, setFirebaseError] = useState("");
            
            // UI 탭 상태
            const [activeMainTab, setActiveMainTab] = useState("materials"); 

            // 가입/로그인 폼 상태
            const [signUpEmail, setSignUpEmail] = useState("");
            const [signUpPassword, setSignUpPassword] = useState("");
            const [signUpPasswordConfirm, setSignUpPasswordConfirm] = useState("");
            const [signUpName, setSignUpName] = useState("");
            const [signUpGrade, setSignUpGrade] = useState("1학년");
            
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            // 데이터 상태
            const [materials, setMaterials] = useState([]);
            const [qnaList, setQnaList] = useState([]);
            
            const [selectedMaterial, setSelectedMaterial] = useState(null);
            const [selectedQna, setSelectedQna] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            
            // 필터링
            const [activeGradeFilter, setActiveGradeFilter] = useState("전체");
            const [activeSubjectFilter, setActiveSubjectFilter] = useState("전체");
            const [activeTypeFilter, setActiveTypeFilter] = useState("전체");
            
            // 모달 관리
            const [isUploadOpen, setIsUploadOpen] = useState(false);
            const [isQnaWriteOpen, setIsQnaWriteOpen] = useState(false);
            const [isPreviewMode, setIsPreviewMode] = useState(false);
            
            // 글로벌 실시간 공지
            const [noticeText, setNoticeText] = useState("도계고등학교 학습 아카이브 3.0에 오신 것을 환영합니다! 진짜 파일 공유 기능이 활성화되었습니다.");

            // 🚀 실제 파일 업로드 상태 관리
            const [newTitle, setNewTitle] = useState("");
            const [newSubject, setNewSubject] = useState("물리학 I");
            const [newGrade, setNewGrade] = useState("1학년");
            const [newType, setNewType] = useState("요약 노트");
            const [newFile, setNewFile] = useState(null); // 실제 파일 객체 저장용
            const [newDescription, setNewDescription] = useState("");
            const [uploadProgress, setUploadProgress] = useState(0); // 프로그레스 바 상태

            // Q&A 작성 폼
            const [newQnaTitle, setNewQnaTitle] = useState("");
            const [newQnaContent, setNewQnaContent] = useState("");
            const [newQnaSubject, setNewQnaSubject] = useState("전체");
            
            // 최고 관리자 대시보드
            const [isAdminConsoleOpen, setIsAdminConsoleOpen] = useState(false);
            const [usersList, setUsersList] = useState([]);

            // 커스텀 알림
            const [commentInput, setCommentInput] = useState("");
            const [toast, setToast] = useState(null);
            const [customConfirm, setCustomConfirm] = useState(null);
            const [customAlert, setCustomAlert] = useState(null);

            const showToast = (message, type = "success") => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const triggerAlert = (message, title = "도계 아카이브 시스템 안내") => {
                setCustomAlert({ message, title });
            };

            const triggerConfirm = (message, onConfirm, title = "권한 실행 요청") => {
                setCustomConfirm({ message, title, onConfirm });
            };

            const sanitizeEmailForDocId = (email) => {
                return email.replace(/\./g, "_");
            };

            const isValidSchoolEmail = (email) => {
                return email.endsWith(`@${SCHOOL_DOMAIN}`);
            };

            // D-Day 계산기
            const calculateDday = (targetDateStr) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0); 
                const targetDate = new Date(targetDateStr);
                targetDate.setHours(0, 0, 0, 0);
                const diffTime = targetDate - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            useEffect(() => {
                const restoreAndSetupLocal = () => {
                    const savedUser = localStorage.getItem("dogye_current_user");
                    if (savedUser) {
                        try { setUser(JSON.parse(savedUser)); } catch (e) {}
                    }
                    
                    const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                    if (!localUsers.some(u => u.email === "admin@dogye.hs.kr")) {
                        localUsers.push({
                            name: "최고관리자",
                            email: "admin@dogye.hs.kr",
                            password: "dogyehs2027",
                            grade: "관리자 소속",
                            role: "admin",
                            schoolUserId: "admin_master_system"
                        });
                        localStorage.setItem("dogye_archive_users", JSON.stringify(localUsers));
                    }
                };

                restoreAndSetupLocal();

                const tryFirebaseSync = () => {
                    if (window.firebaseMethods) {
                        const { onAuthStateChanged, signInAnonymously } = window.firebaseMethods;
                        const auth = window.auth;

                        signInAnonymously(auth).then(() => {
                            onAuthStateChanged(auth, (fUser) => {
                                if (fUser) {
                                    setIsLocalMode(false);
                                    listenToCloudMaterials();
                                    listenToCloudQna();
                                }
                                setIsFirebaseLoading(false);
                            });
                        }).catch((err) => {
                            setFirebaseError(err.message || String(err));
                            setIsLocalMode(true);
                            setIsFirebaseLoading(false);
                        });
                    } else {
                        setIsLocalMode(true);
                        setIsFirebaseLoading(false);
                    }
                };

                const handleFirebaseInitEvent = () => tryFirebaseSync();
                window.addEventListener('firebase-initialized', handleFirebaseInitEvent);
                if (window.firebaseMethods) tryFirebaseSync();

                return () => window.removeEventListener('firebase-initialized', handleFirebaseInitEvent);
            }, []);

            // Firestore 실시간 리스너 (자료실)
            const listenToCloudMaterials = () => {
                const { collection, onSnapshot } = window.firebaseMethods;
                const materialsRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'materials');
                
                onSnapshot(materialsRef, (snapshot) => {
                    const cloudList = [];
                    snapshot.forEach((d) => { cloudList.push({ ...d.data(), id: d.id }); });
                    cloudList.sort((a, b) => b.date.localeCompare(a.date));
                    setMaterials(cloudList);
                }, () => setIsLocalMode(true));
            };

            // Firestore 실시간 리스너 (Q&A)
            const listenToCloudQna = () => {
                const { collection, onSnapshot } = window.firebaseMethods;
                const qnaRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'qna');
                
                onSnapshot(qnaRef, (snapshot) => {
                    const qList = [];
                    snapshot.forEach((d) => { qList.push({ ...d.data(), id: d.id }); });
                    qList.sort((a, b) => b.date.localeCompare(a.date));
                    setQnaList(qList);
                });
            };

            // 로그인 및 회원가입
            const handleLogin = (e) => {
                e.preventDefault();
                if (!loginEmail || !loginPassword) return triggerAlert("이메일 주소와 패스워드를 올바르게 입력해 주세요.");
                
                if (loginEmail === "admin@dogye.hs.kr" && loginPassword === "dogyehs2027") {
                    const adminSession = { name: "최고관리자", email: "admin@dogye.hs.kr", grade: "관리자 소속", role: "admin", schoolUserId: "admin_master_system" };
                    setUser(adminSession);
                    localStorage.setItem("dogye_current_user", JSON.stringify(adminSession));
                    showToast("최고 마스터 관리자 등급으로 접속에 성공했습니다!");
                    return;
                }

                if (!isValidSchoolEmail(loginEmail)) return triggerAlert("인가되지 않은 사용자입니다. 도계고 이메일 규격 외 접속은 허용되지 않습니다.");

                const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                const found = localUsers.find(u => u.email === loginEmail);

                if (found && found.password === loginPassword) {
                    setUser(found);
                    localStorage.setItem("dogye_current_user", JSON.stringify(found));
                    showToast(`반가워요, ${found.name}님!`);
                } else {
                    triggerAlert("정보가 일치하지 않거나 가입되지 않은 이메일입니다.");
                }
            };

            const handleSignUp = (e) => {
                e.preventDefault();
                if (!signUpName || !signUpEmail || !signUpPassword) return triggerAlert("모든 양식을 채워주세요.");
                if (signUpPassword !== signUpPasswordConfirm) return triggerAlert("비밀번호 확인이 다릅니다.");
                if (!isValidSchoolEmail(signUpEmail)) return triggerAlert("도계고 학생만 가입 가능합니다 (@dogye.hs.kr).");

                const localUsers = JSON.parse(localStorage.getItem("dogye_archive_users") || "[]");
                if (localUsers.some(u => u.email === signUpEmail)) return triggerAlert("이미 가입된 이메일입니다.");

                const newUser = { name: signUpName, email: signUpEmail, password: signUpPassword, grade: signUpGrade, role: "student", schoolUserId: "student_" + Date.now() };
                localUsers.push(newUser);
                localStorage.setItem("dogye_archive_users", JSON.stringify(localUsers));

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, setDoc } = window.firebaseMethods;
                    setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', sanitizeEmailForDocId(signUpEmail)), newUser).catch(() => {});
                }

                setUser(newUser);
                localStorage.setItem("dogye_current_user", JSON.stringify(newUser));
                showToast("도계 아카이브 회원 자격이 승인되었습니다!");
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem("dogye_current_user");
                showToast("로그아웃 되었습니다.");
            };

            // 🚀 진짜 파일 업로드 로직 (Firebase Storage)
            const handleUpload = async (e) => {
                e.preventDefault();
                if (!user) return;
                if (!newTitle || !newFile || !newDescription) {
                    triggerAlert("제목, 자료 소개, 그리고 실제 파일을 모두 첨부해 주세요.");
                    return;
                }

                if (isLocalMode || !window.firebaseMethods) {
                    triggerAlert("클라우드 동기화가 꺼져 있어 파일을 업로드할 수 없습니다. 관리자에게 문의하세요.");
                    return;
                }

                const newId = String(Date.now());
                setUploadProgress(5); // 프로그레스 바 시작

                try {
                    const { ref, uploadBytesResumable, getDownloadURL, doc, setDoc } = window.firebaseMethods;
                    const storage = window.storage;
                    
                    // 파일명 충돌 방지를 위해 고유 ID를 붙임
                    const safeFileName = `${newId}_${newFile.name}`;
                    const fileRef = ref(storage, `materials/${safeFileName}`);
                    
                    const uploadTask = uploadBytesResumable(fileRef, newFile);
                    
                    uploadTask.on('state_changed', 
                        (snapshot) => {
                            // 진행률 계산
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            setUploadProgress(Math.max(5, Math.round(progress)));
                        }, 
                        (error) => {
                            console.error(error);
                            triggerAlert("파일 업로드 중 오류가 발생했습니다.");
                            setUploadProgress(0);
                        }, 
                        async () => {
                            // 업로드 완료 후 다운로드 URL 획득
                            const downloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
                            setUploadProgress(100);

                            const formatDoc = {
                                id: newId,
                                title: newTitle,
                                grade: newGrade,
                                subject: newSubject,
                                type: newType,
                                uploader: user.name,
                                uploaderEmail: user.email,
                                fileType: newFile.name.split('.').pop().toLowerCase(),
                                fileName: newFile.name,
                                downloads: 0,
                                likes: 0,
                                isVerified: user.role === "admin",
                                description: newDescription,
                                comments: [],
                                date: new Date().toISOString().split('T')[0],
                                fileUrl: downloadUrl // 🚀 Firebase Storage 진짜 링크 저장
                            };

                            // Firestore 데이터베이스에 문서 기록
                            await setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'materials', newId), formatDoc);
                            
                            showToast("진짜 파일 자료 기부가 완벽하게 등록되었습니다!");
                            setIsUploadOpen(false);
                            
                            // 폼 초기화
                            setNewTitle("");
                            setNewFile(null);
                            setNewDescription("");
                            setUploadProgress(0);
                            
                            // 파일 입력 필드 초기화 (DOM 레벨)
                            const fileInput = document.getElementById("file-upload-input");
                            if(fileInput) fileInput.value = "";
                        }
                    );
                } catch (err) {
                    console.error("Upload error:", err);
                    triggerAlert("서버와 통신 중 문제가 발생했습니다.");
                    setUploadProgress(0);
                }
            };

            const handleLike = async (mId) => {
                if (!user) return;
                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    const target = materials.find(m => m.id === mId);
                    if(target) {
                        updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'materials', mId), { likes: (target.likes || 0) + 1 }).catch(()=>{});
                    }
                }
            };

            // 🚀 실제 파일 다운로드 로직
            const handleDownload = async (mat) => {
                if (!user) return;
                
                // 다운로드 수 증가
                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, updateDoc } = window.firebaseMethods;
                    updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'materials', mat.id), { downloads: (mat.downloads || 0) + 1 }).catch(()=>{});
                }

                if (mat.fileUrl) {
                    // Firebase Storage 파일은 브라우저에서 새 창으로 열어서 다운로드 되도록 처리
                    window.open(mat.fileUrl, '_blank');
                    showToast("원본 파일을 다운로드합니다.");
                    return;
                }

                triggerAlert("자료 파일을 찾을 수 없습니다.");
            };

            const handleCommentSubmit = async (e, targetId, isQna = false) => {
                e.preventDefault();
                if (!user || !commentInput.trim()) return;

                const newComment = { id: String(Date.now()), author: user.name, text: commentInput.trim(), date: new Date().toISOString().split('T')[0] };

                if (!isQna) {
                    const target = materials.find(m => m.id === targetId);
                    if (target && !isLocalMode && window.firebaseMethods) {
                        const { doc, updateDoc } = window.firebaseMethods;
                        updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'materials', targetId), { comments: [...(target.comments || []), newComment] }).catch(()=>{});
                    }
                } else {
                    const target = qnaList.find(q => q.id === targetId);
                    if (target && !isLocalMode && window.firebaseMethods) {
                        const { doc, updateDoc } = window.firebaseMethods;
                        updateDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'qna', targetId), { 
                            comments: [...(target.comments || []), newComment],
                            answers: (target.answers || 0) + 1
                        }).catch(()=>{});
                    }
                }
                setCommentInput("");
                showToast("의견을 등록했습니다.");
            };

            const handleQnaSubmit = async (e) => {
                e.preventDefault();
                if(!user || !newQnaTitle || !newQnaContent) return triggerAlert("제목과 내용을 모두 적어주세요.");

                const newQna = {
                    id: String(Date.now()),
                    title: newQnaTitle,
                    content: newQnaContent,
                    subject: newQnaSubject,
                    author: user.name,
                    authorEmail: user.email,
                    date: new Date().toISOString().split('T')[0],
                    answers: 0,
                    comments: []
                };

                if (!isLocalMode && window.firebaseMethods) {
                    const { doc, setDoc } = window.firebaseMethods;
                    try {
                        await setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'qna', newQna.id), newQna);
                    } catch (err) { }
                }

                showToast("질문/요청 게시글이 등록되었습니다!");
                setIsQnaWriteOpen(false);
                setNewQnaTitle("");
                setNewQnaContent("");
            };

            const deleteMaterial = async (mId) => {
                if (user?.role !== "admin") return;
                triggerConfirm("이 자료를 영구 파기하시겠습니까? (실제 파일도 서버에서 삭제됩니다)", async () => {
                    const target = materials.find(m => m.id === mId);
                    setSelectedMaterial(null);
                    
                    if (!isLocalMode && window.firebaseMethods) {
                        const { doc, deleteDoc, ref, deleteObject } = window.firebaseMethods;
                        // Firestore 텍스트 데이터 삭제
                        deleteDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'materials', mId)).catch(()=>{});
                        // Storage 실제 파일 삭제
                        if (target && target.fileUrl) {
                            try {
                                const fileRef = ref(window.storage, `materials/${mId}_${target.fileName}`);
                                await deleteObject(fileRef);
                            } catch(e) { console.warn("Storage deletion failed or file doesn't exist.") }
                        }
                    }
                    showToast("자료와 실제 파일이 모두 완전 삭제되었습니다.");
                });
            };
            
            const deleteQna = async (qId) => {
                if (user?.role !== "admin") return;
                triggerConfirm("이 게시글을 영구 파기하시겠습니까?", async () => {
                    setSelectedQna(null);
                    if (!isLocalMode && window.firebaseMethods) {
                        const { doc, deleteDoc } = window.firebaseMethods;
                        deleteDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'qna', qId)).catch(()=>{});
                    }
                    showToast("게시글이 삭제되었습니다.");
                });
            }

            const isPdfOrImage = (filename) => {
                if (!filename) return false;
                const ext = filename.split('.').pop().toLowerCase();
                return ['pdf', 'png', 'jpg', 'jpeg', 'gif'].includes(ext);
            };

                        </div>
                    )}

                    {/* Q&A 상세 모달 */}
                    {selectedQna && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden border border-slate-200 flex flex-col">
                                <div className="p-6 border-b border-slate-100 flex items-start justify-between bg-slate-50">
                                    <div>
                                        <span className="bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-0.5 rounded mb-2 inline-block">{selectedQna.subject}</span>
                                        <h2 className="text-lg font-extrabold text-slate-800 leading-snug">{selectedQna.title}</h2>
                                        <p className="text-xs text-slate-400 mt-1">작성자: {selectedQna.author} | {selectedQna.date}</p>
                                    </div>
                                    <button onClick={() => setSelectedQna(null)} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 text-sm text-slate-700 whitespace-pre-wrap leading-relaxed min-h-[100px]">
                                        {selectedQna.content}
                                    </div>
                                    
                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <div className="flex justify-between items-center">
                                            <h4 className="text-xs font-bold text-slate-500">답변 및 댓글 ({selectedQna.answers || 0})</h4>
                                            {user?.role === "admin" && <button onClick={() => deleteQna(selectedQna.id)} className="text-red-500 text-xs font-bold"><i className="fa-solid fa-trash mr-1"></i>게시글 삭제</button>}
                                        </div>
                                        <div className="space-y-3 max-h-60 overflow-y-auto">
                                            {(selectedQna.comments || []).map(c => (
                                                <div key={c.id} className="bg-emerald-50 p-3 rounded-lg text-xs border border-emerald-100">
                                                    <div className="font-bold text-emerald-800 mb-1">{c.author} <span className="text-slate-400 font-normal text-[10px] ml-2">{c.date}</span></div>
                                                    <div className="text-slate-700">{c.text}</div>
                                                </div>
                                            ))}
                                            {(selectedQna.comments || []).length === 0 && <p className="text-xs text-slate-400 text-center py-4">아직 답변이 없습니다. 아는 내용이라면 답변을 달아주세요!</p>}
                                        </div>
                                        <form onSubmit={(e) => handleCommentSubmit(e, selectedQna.id, true)} className="flex gap-2">
                                            <input type="text" placeholder="도움이 되는 답변을 남겨주세요." value={commentInput} onChange={(e)=>setCommentInput(e.target.value)} className="flex-1 px-3 py-2 bg-white border border-slate-300 rounded-xl focus:ring-1 focus:ring-blue-500 text-xs" />
                                            <button type="submit" className="bg-emerald-600 text-white px-4 rounded-xl text-xs font-bold shadow-sm">답변하기</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Q&A 작성 모달 */}
                    {isQnaWriteOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                                    <h2 className="text-base font-bold text-slate-800"><i className="fa-solid fa-pen text-purple-600 mr-2"></i>질문 / 자료 요청 작성</h2>
                                    <button onClick={() => setIsQnaWriteOpen(false)} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>
                                <form onSubmit={handleQnaSubmit} className="p-6 space-y-4">
                                    <div><input type="text" placeholder="제목을 적어주세요 (예: 2학기 문학 기출 구합니다!)" value={newQnaTitle} onChange={(e)=>setNewQnaTitle(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm focus:ring-1 focus:ring-blue-500" /></div>
                                    <div>
                                        <select value={newQnaSubject} onChange={(e)=>setNewQnaSubject(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none bg-white">
                                            <option value="국어">국어</option><option value="수학">수학</option><option value="영어">영어</option><option value="과학">과학</option><option value="기타">기타 요청</option>
                                        </select>
                                    </div>
                                    <div><textarea placeholder="궁금한 문제나 필요한 자료를 상세히 적어주세요." value={newQnaContent} onChange={(e)=>setNewQnaContent(e.target.value)} rows="5" className="w-full px-3 py-2 border rounded-xl text-sm resize-none focus:ring-1 focus:ring-blue-500"></textarea></div>
                                    <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow text-sm">게시글 등록하기</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 자료 기부 모달 (진짜 파일 업로드 + 프로그레스 바) */}
                    {isUploadOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-200">
                                <div className="p-5 border-b border-slate-100 flex justify-between bg-slate-50">
                                    <h2 className="text-base font-bold"><i className="fa-solid fa-file-arrow-up text-blue-600 mr-2"></i>클라우드 파일 업로드</h2>
                                    <button onClick={() => { setIsUploadOpen(false); setUploadProgress(0); }} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleUpload} className="p-6 space-y-4">
                                    <input type="text" placeholder="자료 제목을 적어주세요" value={newTitle} onChange={(e)=>setNewTitle(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-xs focus:ring-1 focus:ring-blue-500" disabled={uploadProgress > 0} />
                                    
                                    <div className="flex gap-2">
                                        <select value={newGrade} onChange={(e)=>setNewGrade(e.target.value)} className="flex-1 px-3 py-2 border rounded-xl text-xs" disabled={uploadProgress > 0}><option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option></select>
                                        <select value={newSubject} onChange={(e)=>setNewSubject(e.target.value)} className="flex-1 px-3 py-2 border rounded-xl text-xs" disabled={uploadProgress > 0}><option value="국어">국어</option><option value="수학">수학</option><option value="영어">영어</option><option value="물리학 I">물리학 I</option><option value="화학 I">화학 I</option><option value="생명과학 I">생명과학 I</option><option value="지구과학 I">지구과학 I</option><option value="통합과학">통합과학</option><option value="통합사회">통합사회</option></select>
                                    </div>
                                    
                                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                                        <label className="block text-[11px] font-bold text-blue-800 mb-2"><i className="fa-solid fa-paperclip mr-1"></i>실제 파일 첨부 (PDF, HWP, 이미지 등)</label>
                                        <input type="file" id="file-upload-input" onChange={(e)=>setNewFile(e.target.files[0])} className="w-full text-xs bg-white rounded-lg p-2 border border-blue-100" disabled={uploadProgress > 0} />
                                        
                                        {/* 🚀 파일 업로드 애니메이션 진행 표시줄 */}
                                        {uploadProgress > 0 && (
                                            <div className="mt-3">
                                                <div className="flex justify-between text-[10px] font-bold text-blue-600 mb-1">
                                                    <span>클라우드 서버 전송 중...</span>
                                                    <span>{uploadProgress}%</span>
                                                </div>
                                                <div className="w-full bg-blue-100 rounded-full h-2">
                                                    <div className="bg-blue-600 h-2 rounded-full transition-all duration-300 ease-out" style={{ width: `${uploadProgress}%` }}></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <textarea placeholder="자료에 대한 팁이나 오답노트를 적어주세요." value={newDescription} onChange={(e)=>setNewDescription(e.target.value)} rows="3" className="w-full px-3 py-2 border rounded-xl text-xs resize-none focus:ring-1 focus:ring-blue-500" disabled={uploadProgress > 0}></textarea>
                                    
                                    <button type="submit" disabled={uploadProgress > 0} className={`w-full font-bold py-3 rounded-xl shadow-md text-sm transition-all ${uploadProgress > 0 ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                                        {uploadProgress > 0 ? '서버에 저장 중입니다...' : '도계 아카이브 등재 신청'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {toast && <div className="fixed bottom-4 right-4 z-[99] bg-slate-900 text-white py-3 px-5 rounded-xl text-xs shadow-xl">{toast.message}</div>}
                    {customAlert && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl max-w-sm w-full text-center shadow-2xl"><h3 className="font-bold text-slate-800 mb-2">{customAlert.title}</h3><p className="text-xs text-slate-500 mb-4 whitespace-pre-wrap">{customAlert.message}</p><button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-xl">확인</button></div>
                        </div>
                    )}
                    {customConfirm && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-6 rounded-2xl max-w-sm w-full text-center shadow-2xl"><h3 className="font-bold text-slate-800 mb-2">{customConfirm.title}</h3><p className="text-xs text-slate-500 mb-4">{customConfirm.message}</p>
                                <div className="flex gap-2"><button onClick={()=>setCustomConfirm(null)} className="flex-1 bg-slate-100 text-slate-600 text-xs font-bold py-2 rounded-xl">취소</button><button onClick={()=>{customConfirm.onConfirm(); setCustomConfirm(null);}} className="flex-1 bg-red-600 text-white text-xs font-bold py-2 rounded-xl">실행</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
